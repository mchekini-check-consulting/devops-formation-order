name: CI Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write   # nécessaire pour le token OIDC Azure
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Checkout + Setup Python + pip install + cache
  # ──────────────────────────────────────────────
  checkout-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

  # ──────────────────────────────────────────────
  # Job 2 : Lint (flake8 / ruff)
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: flake8 .


  # ──────────────────────────────────────────────
  # Job 3 : Secrets scanning (Gitleaks)
  # ──────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Job 4 : Dependency vulnerability check
  # ──────────────────────────────────────────────
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: checkout-setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt 2>&1 | tee pip-audit-report.txt
        continue-on-error: false

      - name: Generate HTML audit report
        if: always()
        run: |
          echo "<html><head><title>pip-audit report</title></head><body><pre>" > pip-audit-report.html
          cat pip-audit-report.txt >> pip-audit-report.html
          echo "</pre></body></html>" >> pip-audit-report.html

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: pip-audit-report.html
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 5 : Tests unitaires + couverture
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install coverage

      - name: Run unit tests with coverage
        run: coverage run --data-file=.coverage.unit manage.py test orders.tests.unit --verbosity=2
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_ALLOWED_HOSTS: "*"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      - name: Generate unit coverage report
        run: |
          coverage report --data-file=.coverage.unit
          coverage json --data-file=.coverage.unit -o coverage/unit/coverage-summary.json
          coverage xml --data-file=.coverage.unit -o coverage/unit/coverage.xml
          coverage html --data-file=.coverage.unit -d coverage/unit/htmlcov

      - name: Run integration tests with coverage
        run: coverage run --data-file=.coverage.integration manage.py test orders.tests.integration --verbosity=2
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_ALLOWED_HOSTS: "*"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      - name: Generate integration coverage report
        run: |
          coverage report --data-file=.coverage.integration
          coverage json --data-file=.coverage.integration -o coverage/integration/coverage-summary.json
          coverage xml --data-file=.coverage.integration -o coverage/integration/coverage.xml
          coverage html --data-file=.coverage.integration -d coverage/integration/htmlcov

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 6 : Coverage gate (seuil 80% lines)
  # ──────────────────────────────────────────────
  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Check coverage threshold (80% lines)
        run: |
          echo "=== Unit test coverage ==="
          UNIT_COV=$(cat coverage/unit/coverage-summary.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['totals']['percent_covered_display'])
          ")
          echo "Unit line coverage: ${UNIT_COV}%"

          echo "=== Integration test coverage ==="
          INTEG_COV=$(cat coverage/integration/coverage-summary.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['totals']['percent_covered_display'])
          ")
          echo "Integration line coverage: ${INTEG_COV}%"

          THRESHOLD=80
          FAILED=0
          if [ "$(echo "${UNIT_COV} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Unit coverage ${UNIT_COV}% is below threshold ${THRESHOLD}%"
            FAILED=1
          else
            echo "Unit coverage ${UNIT_COV}% meets threshold ${THRESHOLD}%"
          fi
          if [ "$(echo "${INTEG_COV} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Integration coverage ${INTEG_COV}% is below threshold ${THRESHOLD}%"
            FAILED=1
          else
            echo "Integration coverage ${INTEG_COV}% meets threshold ${THRESHOLD}%"
          fi
          exit $FAILED

  # ──────────────────────────────────────────────
  # Job 7 : SonarQube analysis
  # ──────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Sonar results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonar-report
          path: .scannerwork/report-task.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 8 : Mutation testing (mutmut)
  # ──────────────────────────────────────────────
  mutation-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonar, coverage-gate]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "mutmut<3"

      - name: Run mutmut mutation testing
        run: mutmut run || true
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_ALLOWED_HOSTS: "*"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: order_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

      - name: Generate mutation report
        run: |
          mkdir -p reports/mutation
          mutmut results > reports/mutation/mutmut-results.txt || true
          mutmut html || true
          cp -r html reports/mutation/ 2>/dev/null || true

      - name: Check mutation score threshold (60%)
        run: |
          python3 -c "
          import sqlite3, sys
          conn = sqlite3.connect('.mutmut-cache')
          rows = dict(conn.execute('SELECT status, COUNT(*) FROM mutant GROUP BY status').fetchall())
          killed = rows.get('ok_killed', 0)
          survived = rows.get('bad_survived', 0)
          total = killed + survived
          score = killed * 100 // total
          print(f'Mutation score: {score}% ({killed}/{total})')
          if score < 60:
              print(f'::error::Mutation score {score}% is below threshold 60%')
              sys.exit(1)
          "

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 9 : Build application + Docker image
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: mutation-testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (OCI format)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: order:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=order-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: order-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 10 : Image scan (Trivy)
  # ──────────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Extract OCI image
        run: mkdir -p order-image && tar -xf order-image.tar -C order-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: order-image
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
          output: trivy-vuln-report.txt

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-misconfig-report.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-vuln-report.txt
            trivy-misconfig-report.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 11 : Build & Push to ACR (OIDC)
  # ──────────────────────────────────────────────
  push-acr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image-scan
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_BASE_REF:-$GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          ENV="dev"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=${SHORT_SHA}-${BRANCH}-${ENV}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Push image to ACR
        uses: pr-mpt/actions-push-oci-archive-to-registry@v1
        with:
          archive: order-image.tar
          image: crformation.azurecr.io/order
          tag: ${{ steps.vars.outputs.tag }}

      - name: Display tags summary
        run: |
          echo "=== Tags Summary ==="
          echo "Image tag : ${{ steps.vars.outputs.tag }}"
          echo "Helm chart version : 1.0.${{ github.run_number }}"

  # ──────────────────────────────────────────────
  # Job 12 : Push Helm chart to ACR (OCI)
  # ──────────────────────────────────────────────
  helm-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: push-acr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Inject build metadata into chart
        run: |
          IMAGE_TAG="${{ needs.push-acr.outputs.image-tag }}"
          BUILD_ID="${{ github.run_number }}"
          sed -i "s/^version:.*/version: 1.0.${BUILD_ID}/" helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${IMAGE_TAG}\"/" helm/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${IMAGE_TAG}\"/" helm/values.yaml
          echo "=== Chart.yaml ==="
          cat helm/Chart.yaml
          echo "=== values.yaml image.tag ==="
          grep "tag:" helm/values.yaml

      - name: Package and push Helm chart
        run: |
          helm package ./helm
          helm push order-*.tgz oci://crformation.azurecr.io/helm