name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        type: choice
        options:
          - dev
          - qualif
          - prod
      chart_version:
        description: "Version du chart Helm (ex: 1.0.0) - laisser vide pour la dernière version"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Vérifier que le chart existe dans ACR
  # ──────────────────────────────────────────────
  verify-chart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Verify chart exists in ACR
        run: |
          VERSION="${{ inputs.chart_version }}"
          if [ -n "$VERSION" ]; then
            if ! helm show chart oci://crformation.azurecr.io/helm/order --version "$VERSION" > /dev/null 2>&1; then
              echo "::error::Chart version '$VERSION' not found in ACR"
              exit 1
            fi
            echo "Chart version '$VERSION' found in ACR"
          else
            if ! helm show chart oci://crformation.azurecr.io/helm/order > /dev/null 2>&1; then
              echo "::error::No chart 'order' found in ACR"
              exit 1
            fi
            echo "Latest chart found in ACR"
          fi

  # ──────────────────────────────────────────────
  # Job 2 : Déployer sur le cluster AKS
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify-chart
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Helm upgrade
        run: |
          helm upgrade order oci://crformation.azurecr.io/helm/order \
            --install \
            ${{ inputs.chart_version && format('--version {0}', inputs.chart_version) || '' }} \
            --namespace ${{ inputs.environment }} \
            --create-namespace \
            -f helm/values-${{ inputs.environment }}.yaml \
            --wait \
            --atomic \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/order \
            --namespace ${{ inputs.environment }} \
            --timeout=120s
