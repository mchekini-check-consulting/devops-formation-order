name: CD Pipeline

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        type: choice
        options:
          - qualif
          - prod
      image_tag:
        description: "Tag image existant dans ACR à promouvoir"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build application + Docker image (push only)
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (OCI format)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: order:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=order-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: order-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2 : Image scan (Trivy) (push only)
  # ──────────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Extract OCI image
        run: mkdir -p order-image && tar -xf order-image.tar -C order-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: order-image
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
          output: trivy-vuln-report.txt

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-misconfig-report.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-vuln-report.txt
            trivy-misconfig-report.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 : Push image to ACR (push only)
  # ──────────────────────────────────────────────
  push-acr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image-scan
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=${SHORT_SHA}-${BRANCH}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Push image to ACR
        uses: pr-mpt/actions-push-oci-archive-to-registry@v1
        with:
          archive: order-image.tar
          image: crformation.azurecr.io/order
          tag: ${{ steps.vars.outputs.tag }}

      - name: Display tags summary
        run: |
          echo "=== Tags Summary ==="
          echo "Image tag : ${{ steps.vars.outputs.tag }}"

  # ──────────────────────────────────────────────
  # Job 4 : Update GitOps repo for dev (push only)
  # ──────────────────────────────────────────────
  update-gitops-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: push-acr
    if: github.event_name == 'push'
    steps:
      - name: Clone GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/${{ github.repository_owner }}/devops-formation-gitops.git
          cd devops-formation-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tag for dev
        run: |
          cd devops-formation-gitops
          yq e '.image.tag = "${{ needs.push-acr.outputs.image-tag }}"' -i environments/dev/40-applications/order/values.yaml
          cat environments/dev/40-applications/order/values.yaml

      - name: Commit and push
        run: |
          cd devops-formation-gitops
          git add .
          git commit -m "chore(dev): update order image tag to ${{ needs.push-acr.outputs.image-tag }}"
          git push

  # ──────────────────────────────────────────────
  # Job 5 : Update GitOps repo for promote (workflow_dispatch)
  # ──────────────────────────────────────────────
  update-gitops-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Clone GitOps repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/${{ github.repository_owner }}/devops-formation-gitops.git
          cd devops-formation-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tag for ${{ inputs.environment }}
        run: |
          cd devops-formation-gitops
          yq e '.image.tag = "${{ inputs.image_tag }}"' -i environments/${{ inputs.environment }}/40-applications/order/values.yaml
          cat environments/${{ inputs.environment }}/40-applications/order/values.yaml

      - name: Commit and push
        run: |
          cd devops-formation-gitops
          git add .
          git commit -m "chore(${{ inputs.environment }}): update order image tag to ${{ inputs.image_tag }}"
          git push
