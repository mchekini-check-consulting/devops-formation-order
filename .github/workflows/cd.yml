name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        type: choice
        options:
          - dev
          - qualif
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build application + Docker image
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (OCI format)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: order:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=order-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: order-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2 : Image scan (Trivy)
  # ──────────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Extract OCI image
        run: mkdir -p order-image && tar -xf order-image.tar -C order-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: order-image
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
          output: trivy-vuln-report.txt

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          output: trivy-misconfig-report.txt

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-vuln-report.txt
            trivy-misconfig-report.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 : Push image to ACR (OIDC)
  # ──────────────────────────────────────────────
  push-acr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: image-scan
    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=${SHORT_SHA}-${BRANCH}-${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Push image to ACR
        uses: pr-mpt/actions-push-oci-archive-to-registry@v1
        with:
          archive: order-image.tar
          image: crformation.azurecr.io/order
          tag: ${{ steps.vars.outputs.tag }}

      - name: Display tags summary
        run: |
          echo "=== Tags Summary ==="
          echo "Image tag : ${{ steps.vars.outputs.tag }}"
          echo "Helm chart version : 1.0.${{ github.run_number }}"

  # ──────────────────────────────────────────────
  # Job 4 : Push Helm chart to ACR (OCI)
  # ──────────────────────────────────────────────
  helm-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: push-acr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Inject build metadata into chart
        run: |
          IMAGE_TAG="${{ needs.push-acr.outputs.image-tag }}"
          BUILD_ID="${{ github.run_number }}"
          sed -i "s/^version:.*/version: 1.0.${BUILD_ID}/" helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${IMAGE_TAG}\"/" helm/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${IMAGE_TAG}\"/" helm/values.yaml
          echo "=== Chart.yaml ==="
          cat helm/Chart.yaml
          echo "=== values.yaml image.tag ==="
          grep "tag:" helm/values.yaml

      - name: Package and push Helm chart
        run: |
          helm package ./helm
          helm push order-*.tgz oci://crformation.azurecr.io/helm

  # ──────────────────────────────────────────────
  # Job 5 : Déployer sur le cluster AKS
  # ──────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: helm-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Login to ACR
        run: az acr login --name crformation

      - name: Helm upgrade
        run: |
          helm upgrade order oci://crformation.azurecr.io/helm/order \
            --install \
            --version 1.0.${{ github.run_number }} \
            --namespace ${{ inputs.environment }} \
            --create-namespace \
            -f helm/values-${{ inputs.environment }}.yaml \
            --wait \
            --atomic \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/order \
            --namespace ${{ inputs.environment }} \
            --timeout=120s
