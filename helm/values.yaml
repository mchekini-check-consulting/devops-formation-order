image:
  repository: crformation.azurecr.io/order
  tag: "2.0"
  pullPolicy: Always

replicaCount: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: "25%"
    maxUnavailable: 0

affinity:
  nodepool: apps

service:
  type: ClusterIP
  port: 8000

probes:
  path: /api/health
  scheme: HTTP
  startup:
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 60
  liveness:
    timeoutSeconds: 3
    periodSeconds: 10
    successThreshold: 1
    failureThreshold: 3
  readiness:
    timeoutSeconds: 3
    periodSeconds: 5
    successThreshold: 1
    failureThreshold: 3

resources:
  requests:
    cpu: 25m
    memory: 256Mi
  limits:
    cpu: 50m
    memory: 384Mi

# initContainer migrate: applies Django DB migrations against postgres-primary before pod starts
initContainer:
  enabled: true
  name: migrate
  command:
    - python
    - manage.py
    - migrate
    - --no-input
  env: []

configmap:
  DJANGO_SETTINGS_MODULE: "config.settings.prod"
  DJANGO_ALLOWED_HOSTS: "*"
  CORS_ALLOW_ALL_ORIGINS: "TRUE"
  LOG_LEVEL: "INFO"
  ENV_NAME: "prod"

secret:
  enabled: false
  data: {}

pdb:
  minAvailable: 1

hpa:
  minReplicas: 2
  maxReplicas: 4
  cpu:
    averageUtilization: 70
  memory:
    averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      percent: 100
      periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      percent: 25
      periodSeconds: 60

vpa:
  updateMode: "Off"

ingress:
  enabled: true
  name: ecommerce-ingress
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  routes:
    - path: /api/orders
      pathType: Prefix
      service:
        name: order
        port: 8000

netpolicies:
  ingresssources: ingress-nginx
  ingressdestports: 8000
  ingressprotocol: TCP
  egresssources: pgcat
  egressdestports: 5432
  egressprotocol: TCP
  dnsport: 53
  httpsinternetports: 443
  httpsprotocol: TCP
